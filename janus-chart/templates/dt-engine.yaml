# /data/janus/janus-chart/templates/dt-engine.yaml

apiVersion: apps/v1
# 💡 핵심: values.yaml의 설정에 따라 DaemonSet 또는 Deployment로 자동 변환
kind: {{ if eq .Values.dtEngine.deploymentMode "daemonset" }}DaemonSet{{ else }}Deployment{{ end }}
metadata:
  name: janus-dt-engine
  labels:
    app.kubernetes.io/name: janus-dt-engine
spec:
  # 💡 Deployment 모드일 때만 파드 개수 옵션 활성화
  {{- if eq .Values.dtEngine.deploymentMode "deployment" }}
  replicas: {{ .Values.dtEngine.replicaCount | default 1 }}
  {{- end }}
  
  selector:
    matchLabels:
      app: janus-dt-engine
  template:
    metadata:
      labels:
        app: janus-dt-engine
    spec:
      containers:
        - name: dt-inference-engine
          image: "{{ .Values.dtEngine.image.repository }}:{{ .Values.dtEngine.image.tag }}"
          imagePullPolicy: {{ .Values.dtEngine.image.pullPolicy }}
          
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ if .Values.embeddedKafka.enabled }}"my-janus-kafka:9092"{{ else }}{{ .Values.externalKafka.bootstrapServers | quote }}{{ end }}
            # 프로젝트 내 joblib 파일명을 정확히 매칭
            - name: MODEL_PATH
              value: "/app/models/cryptojacking_dt_model.joblib"
          
          resources:
            requests:
              cpu: {{ .Values.dtEngine.resources.requests.cpu | quote }}
              memory: {{ .Values.dtEngine.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.dtEngine.resources.limits.cpu | quote }}
              memory: {{ .Values.dtEngine.resources.limits.memory | quote }}
          
          volumeMounts:
            - name: server-local-model
              mountPath: /app/models
              readOnly: true # 원본 보호를 위해 읽기 전용 마운트

      volumes:
        - name: server-local-model
          hostPath:
            path: "/data/janus/models"
            type: Directory