# 🌟 Artifact Hub 공지 반영: 구버전 태그를 위한 레거시 리포지토리 지정
image:
  registry: docker.io
  repository: bitnamilegacy/kafka
  tag: 4.0.0-debian-12-r10

# 자원 다이어트를 위한 KRaft 모드 활성화 (주키퍼 제거)
zookeeper:
  enabled: false
kraft:
  enabled: true

# 단일 노드(브로커 1개)로 실행 및 메모리 512MB 강제 제한
broker:
  replicaCount: 1
  heapOpts: "-Xmx512m -Xms512m"

# 외부 파이썬 코드 통신을 위한 포트 오픈 설정
listeners:
  client:
    protocol: PLAINTEXT
